name: CI

# Quality gates for a Bun-native, run-from-source plugin. There is no build
# step: the plugin manifest launches src/mcp-server/index.js directly under the
# Bun runtime (which provides bun:sqlite), so there is no committed bundle to
# keep in sync. The gates are lint (Biome) and the Bun-native test suite.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - name: Lint (Biome)
        run: bunx biome check .
      - name: Test (bun:test)
        run: bun test
